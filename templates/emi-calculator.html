
{% extends 'base.html' %}
{% load static %}

{% block content %}

<section class="page-head">
  <div class="container">
    <h1>EMI Calculator</h1>
    <p>Calculate your monthly EMI easily.</p>
  </div>
</section>

<section class="section">
  <div class="container">
    <div class="hero-card">
      <h3>Calculate EMI</h3>

      <input id="loanAmount" type="number" placeholder="Loan Amount (₹)" />
      <br><br>

      <input id="interestRate" type="number" placeholder="Interest Rate (% per year)" />
      <br><br>

      <input id="loanMonths" type="number" placeholder="Tenure (Months)" />
      <br><br>

      <!-- ✅ SIMPLE BUTTON -->
      <button type="button" class="btn" onclick="calculateEMI()">Calculate</button>

      <p id="emiResult" style="margin-top:15px;color:#0a66ff;font-weight:700;"></p>
    </div>
  </div>
</section>

<footer class="footer">
  <div class="container copy">© 2026 Instant Loans. All Rights Reserved.</div>
</footer>


{% endblock %}
